version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL: Relational Archival Tier
  # ----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: checkmate-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chess_user
      POSTGRES_PASSWORD: chess_password
      POSTGRES_DB: checkmate_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # Redis: In-Memory Active Session Cache
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: checkmate-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  # ----------------------------------------
  # Apache Kafka
  # ----------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: checkmate-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  postgres_data:
  redis_data:
  kafka_data: