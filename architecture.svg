<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
    <defs>
        <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#333333"/> <stop offset="100%" stop-color="#1A1A1A"/> </linearGradient>
        <linearGradient id="engineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4F4F4F"/> <stop offset="100%" stop-color="#2D2D2D"/> </linearGradient>
        <linearGradient id="kafkaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E0E0E0"/> <stop offset="100%" stop-color="#BDBDBD"/> </linearGradient>
        <linearGradient id="redisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E0E0E0"/> <stop offset="100%" stop-color="#BDBDBD"/> </linearGradient>
        
        <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
        
        <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#000000"/> </marker>
        <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#4F4F4F"/> </marker>
    </defs>

    <rect width="100%" height="100%" fill="#FFFFFF"/> <text x="30" y="40" font-family="Segoe UI, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#000000">Checkmate Engine Architecture</text>
    <text x="30" y="65" font-family="Segoe UI, Helvetica, sans-serif" font-size="14" fill="#333333">Monochromatic Production-Grade Distributed Topology</text>

    <g transform="translate(150, 120)" filter="url(#dropShadow)">
        <rect width="180" height="80" rx="8" fill="url(#clientGrad)" stroke="#000000" stroke-width="1.5"/>
        <text x="90" y="38" font-family="Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Player 1 Client</text>
        <text x="90" y="58" font-family="Segoe UI, sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">WebSocket Connection</text>
    </g>

    <g transform="translate(670, 120)" filter="url(#dropShadow)">
        <rect width="180" height="80" rx="8" fill="url(#clientGrad)" stroke="#000000" stroke-width="1.5"/>
        <text x="90" y="38" font-family="Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Player 2 Client</text>
        <text x="90" y="58" font-family="Segoe UI, sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">WebSocket Connection</text>
    </g>

    <rect x="80" y="270" width="840" height="160" rx="12" fill="none" stroke="#666666" stroke-width="2" stroke-dasharray="8,6"/>
    <text x="95" y="295" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#333333" letter-spacing="1">STATELESS APPLICATION CLUSTER (MULTI-JVM)</text>

    <g transform="translate(120, 320)" filter="url(#dropShadow)">
        <rect width="320" height="90" rx="8" fill="url(#engineGrad)" stroke="#000000" stroke-width="1.5"/>
        <text x="160" y="35" font-family="Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Game Engine Core — Pod A</text>
        <text x="160" y="60" font-family="Segoe UI, sans-serif" font-size="12" fill="#F0F0F0" text-anchor="middle">Predictive Simulation Engine (Spring Boot)</text>
    </g>

    <g transform="translate(560, 320)" filter="url(#dropShadow)">
        <rect width="320" height="90" rx="8" fill="url(#engineGrad)" stroke="#000000" stroke-width="1.5"/>
        <text x="160" y="35" font-family="Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Game Engine Core — Pod B</text>
        <text x="160" y="60" font-family="Segoe UI, sans-serif" font-size="12" fill="#F0F0F0" text-anchor="middle">Predictive Simulation Engine (Spring Boot)</text>
    </g>

    <g transform="translate(120, 520)" filter="url(#dropShadow)">
        <rect width="350" height="80" rx="6" fill="url(#kafkaGrad)" stroke="#000000" stroke-width="1"/>
        <text x="175" y="35" font-family="Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle">Apache Kafka Distributed Cluster</text>
        <text x="175" y="58" font-family="Segoe UI, sans-serif" font-size="12" fill="#333333" text-anchor="middle">Asynchronous Matchmaking Pipelines (Elo Partitions)</text>
    </g>

    <g transform="translate(530, 520)" filter="url(#dropShadow)">
        <rect width="350" height="80" rx="6" fill="url(#redisGrad)" stroke="#000000" stroke-width="1"/>
        <text x="175" y="35" font-family="Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle">Redis In-Memory Store</text>
        <text x="175" y="58" font-family="Segoe UI, sans-serif" font-size="12" fill="#333333" text-anchor="middle">Active Game Room Mappings &amp; Expiry Timeouts</text>
    </g>

    <path d="M 240,205 L 240,312" stroke="#000000" stroke-width="2.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="248" y="255" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#000000" transform="rotate(90, 248, 255)"></text>

    <path d="M 760,205 L 760,312" stroke="#000000" stroke-width="2.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="768" y="255" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#000000" transform="rotate(90, 768, 255)"></text>

    <path d="M 445,365 L 552,365" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,4" marker-start="url(#arrow-gray)" marker-end="url(#arrow-gray)"/>
    <text x="500" y="355" font-family="Segoe UI, sans-serif" font-size="11" fill="#333333" text-anchor="middle">Cross-JVM Pairing</text>

    <path d="M 220,415 L 220,512" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
    
    <path d="M 350,515 L 570,415" stroke="#000000" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
    <text x="440" y="475" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#000000" text-anchor="middle">Asynchronous Match Events</text>

    <path d="M 380,415 L 610,514" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 720,415 L 720,512" stroke="#000000" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="728" y="470" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#000000">Active Mappings</text>
</svg>
